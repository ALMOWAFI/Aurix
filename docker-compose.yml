version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    # Remove ports mapping to prevent direct external access
    # Only Nginx will talk to the backend over the internal Docker network
    expose:
      - "8000"
    env_file:
      - backend/.env
    volumes:
      - ./data:/app/data
      - ./backend:/app/backend
    restart: always

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always
